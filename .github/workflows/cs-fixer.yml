name: Lint & Format (PR & Push)

on:
  pull_request:
    paths: ["**.php"]
  push:
    branches: [early, main]
    paths: ["**.php"]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Security audit
        run: composer audit --ignore CVE-2026-4587

      - name: Mago lint
        run: composer lint

      - name: Mago format check
        run: composer format-check
